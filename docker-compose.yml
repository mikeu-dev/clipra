services:
  db:
    image: mysql
    restart: always
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: PASSWORD
      MYSQL_DATABASE: db-sv-erp-sh
    volumes:
      - mysqldata:/var/lib/mysql

  redis:
    image: redis:alpine
    restart: always
    ports:
      - 6379:6379

  minio:
    image: minio/minio
    restart: always
    ports:
      - 9005:9000
      - 9006:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

volumes:
  mysqldata:
  miniodata:
