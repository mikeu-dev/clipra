<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Offline - SV-ERP</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell,
					sans-serif;
				background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
				color: #ffffff;
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				padding: 20px;
			}

			.container {
				text-align: center;
				max-width: 500px;
			}

			.icon {
				width: 120px;
				height: 120px;
				margin: 0 auto 30px;
				background: rgba(255, 255, 255, 0.1);
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 60px;
			}

			h1 {
				font-size: 32px;
				margin-bottom: 16px;
				font-weight: 700;
			}

			p {
				font-size: 18px;
				line-height: 1.6;
				color: #cbd5e1;
				margin-bottom: 30px;
			}

			.button {
				display: inline-block;
				padding: 14px 32px;
				background: #3b82f6;
				color: white;
				text-decoration: none;
				border-radius: 8px;
				font-weight: 600;
				font-size: 16px;
				transition: all 0.3s ease;
				border: none;
				cursor: pointer;
			}

			.button:hover {
				background: #2563eb;
				transform: translateY(-2px);
				box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
			}

			.status {
				margin-top: 20px;
				padding: 12px 20px;
				background: rgba(239, 68, 68, 0.1);
				border: 1px solid rgba(239, 68, 68, 0.3);
				border-radius: 8px;
				color: #fca5a5;
				font-size: 14px;
			}

			.status.online {
				background: rgba(34, 197, 94, 0.1);
				border-color: rgba(34, 197, 94, 0.3);
				color: #86efac;
			}

			@keyframes pulse {
				0%,
				100% {
					opacity: 1;
				}

				50% {
					opacity: 0.5;
				}
			}

			.checking {
				animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
			}
		</style>
	</head>

	<body>
		<div class="container">
			<div class="icon">
				<svg
					xmlns="http://www.w3.org/2000/svg"
					width="60"
					height="60"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"></path>
					<line x1="16" y1="8" x2="2" y2="22"></line>
					<line x1="17.5" y1="15" x2="9" y2="15"></line>
				</svg>
			</div>

			<h1>You're Offline</h1>
			<p>
				It looks like you've lost your internet connection. Don't worry, you can still access cached
				pages.
			</p>

			<button class="button" onclick="retry()">Try Again</button>

			<div class="status" id="status">
				<span class="checking">Checking connection...</span>
			</div>
		</div>

		<script>
			function retry() {
				window.location.reload();
			}

			// Check online status
			function updateOnlineStatus() {
				const status = document.getElementById('status');
				if (navigator.onLine) {
					status.className = 'status online';
					status.innerHTML = '✓ Connection restored! Click "Try Again" to continue.';
				} else {
					status.className = 'status';
					status.innerHTML = '✗ Still offline. Please check your internet connection.';
				}
			}

			// Listen for online/offline events
			window.addEventListener('online', updateOnlineStatus);
			window.addEventListener('offline', updateOnlineStatus);

			// Initial check
			setTimeout(updateOnlineStatus, 1000);

			// Auto-reload when back online
			window.addEventListener('online', () => {
				setTimeout(() => {
					window.location.reload();
				}, 2000);
			});
		</script>
	</body>
</html>
