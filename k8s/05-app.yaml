apiVersion: apps/v1
kind: Deployment
metadata:
  name: sv-erp-app
  namespace: sv-erp
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sv-erp
  template:
    metadata:
      labels:
        app: sv-erp
    spec:
      containers:
        - name: sv-erp
          image: sv-erp:latest # Replace with actual registry image in production
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: sv-erp-config
            - secretRef:
                name: sv-erp-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: sv-erp-app
  namespace: sv-erp
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: sv-erp
