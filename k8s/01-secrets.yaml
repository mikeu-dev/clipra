apiVersion: v1
kind: Secret
metadata:
  name: sv-erp-secrets
  namespace: sv-erp
type: Opaque
stringData:
  # In a real environment, use sealed-secrets or external-secrets
  # These are examples matching docker-compose
  MYSQL_ROOT_PASSWORD: 'mysecretpassword'
  MYSQL_DATABASE: 'db-sv-erp-sh'
  DATABASE_URL: 'mysql://root:mysecretpassword@mysql:3306/db-sv-erp-sh'
  # Keys
  AES_KEY: 'your-aes-key-must-be-32-chars-exact' # Change in production
  HMAC_KEY: 'your-hmac-key-must-be-32-chars-exact' # Change in production
