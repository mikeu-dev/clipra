apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sv-erp
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'sv-erp-app'
        static_configs:
          - targets: ['sv-erp-app:80']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: sv-erp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: sv-erp
spec:
  ports:
    - port: 9090
  selector:
    app: prometheus
